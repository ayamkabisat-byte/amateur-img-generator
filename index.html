<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indonesian Amateur & Smartphone Prompt Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        pre {
            background-color: #1e293b;
            scrollbar-width: thin;
            scrollbar-color: #ef4444 #1e293b;
        }
        pre::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        pre::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 4px;
        }
        pre::-webkit-scrollbar-thumb {
            background: #ef4444;
            border-radius: 4px;
        }
        select:disabled, input:disabled, button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #475569;
        }
        .locked-label i {
            color: #ef4444; /* red-500 */
        }
        optgroup {
            font-weight: bold;
            color: #fbbf24;
            background-color: #0f172a;
        }
        option {
            color: #e2e8f0;
        }
        /* Custom Scrollbar for List Boxes */
        .listbox-scroll::-webkit-scrollbar { width: 6px; }
        .listbox-scroll::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        .listbox-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
        .listbox-scroll::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <!-- MAIN CONTENT -->
    <div id="mainContent" class="w-full max-w-7xl transition-all duration-500">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2"><i class="fa-solid fa-camera-retro text-red-500 mr-2"></i> Indonesian Amateur Shot V3.9</h1>
            <p class="text-slate-400">Logika Terpadu + Ratusan Skenario Gen-Z + Smart Lock + Komposisi Lengkap.</p>
        </div>

        <!-- NEW UI DASHBOARD: FILTERS & PARAMETERS -->
        <div class="flex flex-col gap-6 mb-8 w-full">
            
            <!-- GROUP 1: BASIC DEMOGRAPHICS -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg text-sm">
                <div>
                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span>Jumlah Orang</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('numSelect', this)"></i>
                    </label>
                    <select id="numSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 transition-colors cursor-pointer">
                        <option value="RANDOM">🎲 Acak (1-6)</option>
                        <option value="1">1 Orang (Solo)</option>
                        <option value="2">2 Orang (Duo)</option>
                        <option value="3">3 Orang (Grup Kecil)</option>
                        <option value="4">4 Orang (Grup)</option>
                        <option value="5">5 Orang (Grup Besar)</option>
                        <option value="6">6 Orang (Grup Besar)</option>
                    </select>
                </div>
                <div>
                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span>Rentang Usia</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('ageSelect', this)"></i>
                    </label>
                    <select id="ageSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 transition-colors cursor-pointer">
                        <option value="RANDOM">🎲 Acak Usia</option>
                        <option value="TEENAGER">Remaja (13-19)</option>
                        <option value="YOUNG_ADULT">Dewasa Muda (20-29)</option>
                        <option value="ADULT">Dewasa (30-40)</option>
                        <option value="MATURE">Paruh Baya (40+)</option>
                    </select>
                </div>
                <div>
                    <label class="flex justify-between items-center text-yellow-400 mb-1 font-semibold text-xs transition-colors">
                        <span><i class="fa-solid fa-star"></i> Tipe Badan</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('bodyTypeSelect', this)"></i>
                    </label>
                    <select id="bodyTypeSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-yellow-200 border border-yellow-600 rounded p-2 outline-none focus:border-yellow-400 cursor-pointer">
                        <option value="MATCH">🖼️ Sesuai Foto (Default)</option>
                        <option value="RANDOM">🎲 Acak Badan</option>
                        <option value="SLIM AND PETITE">Lebih Slim / Kurus</option>
                        <option value="THICK AND CURVY">Curvy / Berisi</option>
                        <option value="MUSCULAR AND TONED">Berotot / Atletis</option>
                        <option value="CHUBBY">Chubby / Gemuk</option>
                    </select>
                </div>
                <div>
                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span>Gender</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('genderSelect', this)"></i>
                    </label>
                    <select id="genderSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 cursor-pointer">
                        <option value="RANDOM">🎲 Acak / Campur</option>
                        <option value="MALE">Semua Pria</option>
                        <option value="FEMALE">Semua Wanita</option>
                        <option value="COUPLE">Couple (Pria & Wanita)</option>
                    </select>
                </div>
            </div>

            <!-- GROUP 2: THE BIG LIST BOXES (SCROLLABLE MENUS) -->

                <!-- Box 1: Era & Location -->

                    <label class="flex justify-between items-center text-blue-400 mb-1 font-semibold text-xs transition-colors">
                        <span><i class="fa-solid fa-clock-rotate-left"></i> Era / Zaman</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('eraSelect', this)"></i>
                    </label>
                    <select id="eraSelect" onchange="updateLocationDropdown()" class="w-full bg-slate-900 text-blue-200 border border-blue-600 rounded p-2 outline-none focus:border-blue-400 transition-colors cursor-pointer font-bold mb-3 shrink-0">
                        <option value="RANDOM">🎲 Acak Era Otomatis</option>
                        <option value="MODERN_2020S">2020s (Modern / Gen-Z)</option>
                        <option value="TIMELESS_BASIC">Timeless / Basic Kasual</option>
                        <option value="HIPSTER_2010S">2010s (Hipster/Indie)</option>
                        <option value="Y2K_2000S">2000s (Y2K/Warnet)</option>
                        <option value="GRUNGE_1990S">1990s (Grunge/Retro)</option>
                    </select>

                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span><i class="fa-solid fa-map-location-dot"></i> Lokasi Spesifik</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('locSelect', this)"></i>
                    </label>
                    <input type="hidden" id="locSelect" value="RANDOM" data-locked="false">
                    <div id="locListContainer" class="flex-1 overflow-y-auto listbox-scroll bg-slate-900 border border-slate-600 rounded-lg p-2 flex flex-col gap-1.5 transition-all">
                        <!-- JS populated -->
                    </div>
                </div>

                <!-- Box 2: NEW UNIFIED CAMERA & ANGLE STYLE -->
                <div class="flex flex-col h-[400px]">
                    <label class="flex justify-between items-center text-orange-400 mb-1 font-semibold text-xs transition-colors">
                        <span><i class="fa-solid fa-video"></i> Gaya Kamera & Angle</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('cameraSelect', this)"></i>
                    </label>
                    <input type="hidden" id="cameraSelect" value="RANDOM" data-locked="false">
                    <div id="cameraListContainer" class="flex-1 overflow-y-auto listbox-scroll bg-slate-900 border border-orange-600/50 rounded-lg p-2 flex flex-col gap-1.5 transition-all">
                        <!-- JS populated -->
                    </div>
                </div>

                <!-- Box 3: Aesthetic -->
                <div class="flex flex-col h-[400px]">
                    <label class="flex justify-between items-center text-purple-400 mb-1 font-semibold text-xs transition-colors">
                        <span><i class="fa-solid fa-wand-magic-sparkles"></i> Filter / Aesthetic</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('aestheticSelect', this)"></i>
                    </label>
                    <input type="hidden" id="aestheticSelect" value="DEFAULT" data-locked="false">
                    <div id="aesListContainer" class="flex-1 overflow-y-auto listbox-scroll bg-slate-900 border border-purple-600/50 rounded-lg p-2 flex flex-col gap-1.5 transition-all">
                        <!-- JS populated -->
                    </div>
                </div>

            </div>

            <!-- GROUP 3: TECHNICALS & SCENARIO -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg text-sm items-end">
                
                <!-- NEW COMPOSITION DROPDOWN -->
                <div>
                    <label class="flex justify-between items-center text-cyan-400 mb-1 font-semibold text-xs transition-colors">
                        <span><i class="fa-solid fa-crop-simple"></i> Komposisi Frame</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('compSelect', this)"></i>
                    </label>
                    <select id="compSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-cyan-200 border border-cyan-700 rounded p-2 outline-none focus:border-cyan-400 cursor-pointer">
                        <option value="RANDOM">🎲 Acak (Otomatis)</option>
                        <option value="GOLDEN_RATIO">Golden Ratio (Fibonacci Spiral)</option>
                        <option value="RULE_OF_THIRDS">Rule of Thirds (Sepertiga)</option>
                        <option value="SYMMETRY">Symmetry and Balance (Simetris)</option>
                        <option value="GOLDEN_TRIANGLE">Golden Triangle (Segitiga Emas)</option>
                        <option value="DIAGONAL">Diagonal (Garis Miring)</option>
                        <option value="FILL_FRAME">Fill the Frame (Mengisi Bingkai)</option>
                        <option value="NEGATIVE_SPACE">Negative Space (Ruang Kosong)</option>
                        <option value="LEADING_LINES">Leading Lines (Garis Pengarah)</option>
                        <option value="FRAMING">Framing (Bingkai Alami)</option>
                    </select>
                </div>

                <div>
                    <label class="flex justify-between items-center text-yellow-400 mb-1 font-semibold text-xs transition-colors">
                        <span><i class="fa-solid fa-star"></i> Hari Raya</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('holidaySelect', this)"></i>
                    </label>
                    <select id="holidaySelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-yellow-200 border border-yellow-600 rounded p-2 outline-none focus:border-yellow-400 cursor-pointer">
                        <option value="NONE">❌ Tidak Ada (Biasa)</option>
                        <option value="RANDOM_HOLIDAY">🎲 Acak (Inkl. Libur)</option>
                        <option value="EID">Idul Fitri (Lebaran)</option>
                        <option value="CHRISTMAS">Natal (Christmas)</option>
                        <option value="IMLEK">Imlek (Lunar New Year)</option>
                        <option value="GALUNGAN">Galungan (Bali)</option>
                    </select>
                </div>
                <div>
                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span>Waktu (Time)</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('timeSelect', this)"></i>
                    </label>
                    <select id="timeSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 cursor-pointer">
                        <option value="RANDOM">🎲 Acak Waktu</option>
                        <option value="MORNING">Pagi Hari</option>
                        <option value="AFTERNOON">Siang Bolong</option>
                        <option value="GOLDEN_HOUR">Sore (Golden Hour)</option>
                        <option value="NIGHT">Malam Hari (Night)</option>
                    </select>
                </div>
                <div>
                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span>Cuaca (Weather)</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('weatherSelect', this)"></i>
                    </label>
                    <select id="weatherSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 cursor-pointer">
                        <option value="RANDOM">🎲 Acak Cuaca</option>
                        <option value="CLEAR">Cerah / Normal</option>
                        <option value="OVERCAST">Mendung (Gloomy)</option>
                        <option value="RAINING">Hujan (Wet)</option>
                    </select>
                </div>
                
                <div>
                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span>Rambut & Aksesoris</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('hairAccSelect', this)"></i>
                    </label>
                    <select id="hairAccSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 cursor-pointer">
                        <option value="RANDOM">🎲 Bebas Berkreasi</option>
                        <option value="MATCH_STRICT" class="font-bold text-red-300">🔒 Sesuai Foto (Strict)</option>
                    </select>
                </div>

                <div>
                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span>AI Face Rules</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('strictSelect', this)"></i>
                    </label>
                    <select id="strictSelect" onchange="toggleStrictLevel(); triggerGenerate();" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 cursor-pointer">
                        <option value="FLEXIBLE">🎨 Bebas (Flexible)</option>
                        <option value="STRICT">🔒 Ketat Wajah (Strict)</option>
                    </select>
                </div>
                
                <div id="strictLevelContainer" class="hidden">
                    <label class="block text-red-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-weight-hanging"></i> Bobot Strict Wajah</label>
                    <input type="number" id="strictWeight" min="0.1" max="1.0" step="0.1" value="1.0" oninput="triggerGenerate()" class="w-full bg-slate-900 text-slate-200 border border-red-600 rounded p-2 outline-none focus:border-red-500 transition-colors">
                </div>

                <div class="col-span-1 sm:col-span-2">
                    <label class="flex justify-between items-center text-green-400 mb-1 font-semibold text-xs transition-colors">
                        <span><i class="fa-solid fa-user-tag"></i> Artis/Tokoh Utama (Opsional)</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('customNameGlobal', this)"></i>
                    </label>
                    <input type="text" id="customNameGlobal" oninput="handleGlobalNameInput()" placeholder="Cth: Reza Rahadian" class="w-full bg-slate-900 text-green-300 border border-green-700 rounded p-2 outline-none focus:border-green-500 transition-colors placeholder-slate-500">
                </div>

                <div class="col-span-1 sm:col-span-2 md:col-span-3 lg:col-span-4">
                    <label class="flex justify-between items-center text-green-400 mb-1 font-semibold text-xs transition-colors">
                        <span><i class="fa-solid fa-clapperboard"></i> Skenario / Pose Manual (Opsional)</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('customScenarioInput', this)"></i>
                    </label>
                    <input type="text" id="customScenarioInput" oninput="triggerGenerate()" placeholder="Cth: Duduk bersandar main HP" class="w-full bg-slate-900 text-green-300 border border-green-700 rounded p-2 outline-none focus:border-green-500 transition-colors placeholder-slate-500">
                </div>
            </div>
        </div>

        <!-- Advanced Character Toggle & Panel -->
        <div class="w-full max-w-7xl mx-auto mb-2 flex justify-between px-4">
            <div class="text-xs text-slate-500 hidden md:block">*Klik gembok terbuka agar opsi tidak ikut teracak.</div>
            <label class="cursor-pointer flex items-center gap-2 text-slate-300 text-sm font-bold bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 hover:bg-slate-700 transition-colors shadow-lg">
                <input type="checkbox" id="advancedToggle" onchange="toggleAdvanced(); triggerGenerate();" class="w-4 h-4 accent-red-500 rounded cursor-pointer">
                <i class="fa-solid fa-sliders"></i> Atur Spesifik Tiap Orang (Advanced)
            </label>
        </div>

        <div id="advancedPanel" class="hidden w-full max-w-7xl mx-auto bg-slate-800/80 p-5 rounded-xl border border-red-900/50 shadow-inner text-sm mb-8">
            <h3 class="text-red-400 font-bold border-b border-red-900/50 pb-2 mb-4"><i class="fa-solid fa-users-viewfinder"></i> Kustomisasi Karakter Independen</h3>
            <div id="characterRows" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
                <!-- JS populated -->
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col sm:flex-row justify-center gap-4 mb-8 w-full max-w-6xl mx-auto">
            <button onclick="resetAndGenerate()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white text-md font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-dice text-xl"></i> ACAK SEMUA
            </button>
            <button onclick="generatePromptNow()" id="generateBtn" class="px-8 py-4 bg-red-600 hover:bg-red-500 text-white text-lg font-bold rounded-xl shadow-lg hover:shadow-red-500/50 transition-all flex items-center justify-center gap-3 transform hover:scale-105 transition-colors duration-300">
                <i class="fa-solid fa-wand-magic-sparkles text-2xl"></i> GENERATE PROMPT
            </button>
        </div>

        <!-- Output Container: 2 Columns -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full">
            
            <!-- Kolom Prompt Foto -->
            <div class="relative bg-slate-800 rounded-xl border border-slate-700 shadow-xl overflow-hidden flex flex-col">
                <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-700">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-image text-blue-400"></i>
                        <span class="text-sm text-slate-300 font-bold tracking-wider">PROMPT FOTO (TEXT-TO-IMAGE)</span>
                    </div>
                    <button onclick="copyToClipboard('photo')" id="copyBtnPhoto" class="text-xs px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded transition-all flex items-center gap-2">
                        <i class="fa-regular fa-copy"></i> Salin
                    </button>
                </div>
                <pre id="jsonOutputPhoto" class="p-4 flex-1 overflow-x-auto text-sm md:text-base font-mono leading-relaxed text-blue-300 max-h-[600px] overflow-y-auto whitespace-pre-wrap word-break">
// Memuat...
                </pre>
            </div>

            <!-- Kolom Prompt Video -->
            <div class="relative bg-slate-800 rounded-xl border border-slate-700 shadow-xl overflow-hidden flex flex-col">
                <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-700">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-video text-purple-400"></i>
                        <span class="text-sm text-slate-300 font-bold tracking-wider">PROMPT VIDEO (TIKTOK/REELS)</span>
                    </div>
                    <button onclick="copyToClipboard('video')" id="copyBtnVideo" class="text-xs px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded transition-all flex items-center gap-2">
                        <i class="fa-regular fa-copy"></i> Salin
                    </button>
                </div>
                <pre id="jsonOutputVideo" class="p-4 flex-1 overflow-x-auto text-sm md:text-base font-mono leading-relaxed text-purple-300 max-h-[600px] overflow-y-auto whitespace-pre-wrap word-break">
// Memuat...
                </pre>
            </div>

        </div>
    </div>

        let generateTimeout;
        function triggerGenerate(delay = 150) {
            clearTimeout(generateTimeout);
            generateTimeout = setTimeout(() => {
                generatePromptCore();
            }, delay);

        // --- HELPER FUNCTIONS ---
        function createRadioOption(name, value, labelText, selectedValue, onchangeAttr, subText = "") {
            const isSelected = value === selectedValue ? "checked" : "";
            let subHtml = subText ? `<div class="text-[10px] text-slate-400 leading-tight mt-1 line-clamp-2">${subText}</div>` : "";
            const bgClass = isSelected ? 'bg-slate-700 border-slate-500 shadow-inner' : 'border-transparent hover:border-slate-600 hover:bg-slate-700/50';
            
            return `
            <label class="flex items-start gap-3 p-3 rounded-lg cursor-pointer transition-all border w-full radio-label ${bgClass}">
                <input type="radio" name="${name}" value="${value}" ${isSelected} data-onchange="${onchangeAttr}" class="mt-0.5 accent-red-500 w-4 h-4 shrink-0 cursor-pointer radio-input">
                <div class="flex flex-col flex-1 pointer-events-none">
                    <span class="text-sm text-slate-200 font-semibold leading-tight">${labelText}</span>
                    ${subHtml}
                </div>
            </label>
            `;
        }

        // Event Delegation for List Boxes to prevent sluggishness
        function setupDelegation(containerId, inputId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.addEventListener('change', function(e) {
                if (e.target && e.target.classList.contains('radio-input')) {
                    const val = e.target.value;
                    document.getElementById(inputId).value = val;
                    
                    container.querySelectorAll('.radio-label').forEach(lbl => {
                        lbl.classList.remove('bg-slate-700', 'border-slate-500', 'shadow-inner');
                        lbl.classList.add('border-transparent', 'hover:border-slate-600', 'hover:bg-slate-700/50');
                    });
                    const parentLabel = e.target.closest('.radio-label');
                    if (parentLabel) {
                        parentLabel.classList.add('bg-slate-700', 'border-slate-500', 'shadow-inner');
                        parentLabel.classList.remove('border-transparent', 'hover:border-slate-600', 'hover:bg-slate-700/50');
                    }

                    const onchangeStr = e.target.getAttribute('data-onchange');
                    if (onchangeStr === "triggerGenerate") {
                        triggerGenerate();
                    }
                }
            });
        }

        function getRandom(arr) { 
            if (!arr || arr.length === 0) return "STANDARD"; 
            return arr[Math.floor(Math.random() * arr.length)];

        function isMirrorFriendly(envName) {
            if (!envName) return false;

            return keywords.some(kw => envName.toUpperCase().includes(kw));
        }

        function getWeightedEra() {
            const totalWeight = eraWeights.reduce((sum, era) => sum + era.weight, 0);
            let randomNum = Math.random() * totalWeight;
            for (const era of eraWeights) {
                if (randomNum < era.weight) return era.id;
                randomNum -= era.weight;
            }
            return "MODERN_2020S";
        }

        function getGenderAndSubject(forcedGender, forcedAge, bodyTypeVal) {
            let agePrefix = "";
            if (forcedAge && forcedAge !== "RANDOM") {
                if (forcedAge === "TEENAGER") agePrefix = "A TEENAGE";
                else if (forcedAge === "YOUNG_ADULT") agePrefix = "A YOUNG";
                else if (forcedAge === "ADULT") agePrefix = "A 30-YEAR-OLD";
                else if (forcedAge === "MATURE") agePrefix = "A MIDDLE-AGED";
            } else {
                const ageRand = Math.random() * 100;
                if (ageRand < 40) agePrefix = "A YOUNG";
                else if (ageRand < 70) agePrefix = "A TEENAGE";
                else if (ageRand < 90) agePrefix = "A 30-YEAR-OLD";
                else agePrefix = "A MIDDLE-AGED";
            }

            let genderStr = "";
            if (forcedGender && forcedGender !== "RANDOM") {
                genderStr = forcedGender;
            } else {
                const rand = Math.random() * 100;
                if (rand < 50) genderStr = "FEMALE";
                else genderStr = "MALE";
            }

            let bodyTypeDesc = "";
            if (bodyTypeVal && bodyTypeVal !== "MATCH" && bodyTypeVal !== "RANDOM") {
                bodyTypeDesc = bodyTypeVal + " ";
            } else if (bodyTypeVal === "RANDOM") {
                bodyTypeDesc = getRandom(["SLIM AND PETITE ", "THICK AND CURVY ", "MUSCULAR AND TONED ", "CHUBBY ", ""]);
            }

            let subjectName = "";
            if (genderStr === "FEMALE") subjectName = `${agePrefix} ${bodyTypeDesc}WOMAN/GIRL`;
            else subjectName = `${agePrefix} ${bodyTypeDesc}MAN/BOY`;

            if (agePrefix === "A TEENAGE") {
                subjectName = subjectName.replace("WOMAN/GIRL", "GIRL").replace("MAN/BOY", "BOY");
            } else {
                subjectName = subjectName.replace("WOMAN/GIRL", "WOMAN").replace("MAN/BOY", "MAN");
            }

            subjectName = subjectName.replace(/\s+/g, ' ').trim();
            return { genderId: genderStr, subjectName: subjectName };
        }

        function toggleLock(selectId, iconEl) {
            const el = document.getElementById(selectId);
            if (!el) return;
            const isLocked = el.dataset.locked === "true";
            
            let containerEl = el;
            if(el.type === 'hidden') {
                if(selectId === 'locSelect') containerEl = document.getElementById('locListContainer');
                if(selectId === 'cameraSelect') containerEl = document.getElementById('cameraListContainer');
                if(selectId === 'aestheticSelect') containerEl = document.getElementById('aesListContainer');
            }

            if (isLocked) {
                el.dataset.locked = "false";
                if(iconEl) {
                    iconEl.classList.remove('fa-lock', 'text-red-500');
                    iconEl.classList.add('fa-lock-open', 'text-slate-500'); 
                    if(iconEl.parentElement && iconEl.parentElement.tagName === 'LABEL') iconEl.parentElement.classList.remove('locked-label');
                }
                
                if(containerEl) {
                    containerEl.classList.remove('border-red-500', 'opacity-50', 'pointer-events-none');
                    if(el.tagName === 'INPUT' && el.type !== 'hidden') containerEl.classList.add('border-green-700');
                    else if (el.type !== 'hidden') containerEl.classList.add('border-slate-600');
                }
            } else {
                el.dataset.locked = "true";
                if(iconEl) {
                    iconEl.classList.remove('fa-lock-open', 'text-slate-500');
                    iconEl.classList.add('fa-lock', 'text-red-500');
                    if(iconEl.parentElement && iconEl.parentElement.tagName === 'LABEL') iconEl.parentElement.classList.add('locked-label');
                }
                
                if(containerEl) {
                    if(el.tagName === 'INPUT' && el.type !== 'hidden') containerEl.classList.remove('border-green-700');
                    else if (el.type !== 'hidden') containerEl.classList.remove('border-slate-600');
                    containerEl.classList.add('border-red-500', 'opacity-50', 'pointer-events-none');
                }
            }
        }

            }
            const customScenarioInput = document.getElementById('customScenarioInput');
            if (customScenarioInput && customScenarioInput.dataset.locked !== "true") {
                customScenarioInput.value = "";
            }
            
            toggleStrictLevel();
            
            const eraSelect = document.getElementById('eraSelect');
            if (eraSelect && eraSelect.dataset.locked !== "true") {
                eraSelect.disabled = false;
                eraSelect.classList.remove('opacity-50', 'cursor-not-allowed');
            }

            const advToggle = document.getElementById('advancedToggle');
            if(advToggle && advToggle.checked) {
                const container = document.getElementById('characterRows');
                if (container) {
                    const rows = container.children.length;
                    for(let i=0; i<rows; i++) {
                        const nameEl = document.getElementById(`adv_name_${i}`);
                        if (nameEl && nameEl.dataset.locked !== "true") nameEl.value = "";
                        
                        const genEl = document.getElementById(`adv_gender_${i}`);
                        if (genEl && genEl.dataset.locked !== "true") genEl.value = "RANDOM";
                        
                        const ageEl = document.getElementById(`adv_age_${i}`);
                        if (ageEl && ageEl.dataset.locked !== "true") ageEl.value = "RANDOM";
                        
                        const demoEl = document.getElementById(`adv_demo_${i}`);
                        if (demoEl && demoEl.dataset.locked !== "true") demoEl.value = "RANDOM";
                    }
                }
                renderAdvancedRows();
            }
            
            renderLocationList();
            renderCameraList();
            renderAestheticList();

            generatePromptNow();
        }

        function updateLocationDropdown() {
            renderLocationList();
            triggerGenerate();
        }

        // --- INIT DROPDOWNS ---
        function initDropdowns() {
            try {
                setupDelegation('locListContainer', 'locSelect');
                setupDelegation('cameraListContainer', 'cameraSelect');
                setupDelegation('aesListContainer', 'aestheticSelect');

                renderLocationList();
                renderCameraList();
                renderAestheticList();
            } catch(e) {
                console.error("Initialization warning: ", e);
            }

            const advToggleInputs = ['numSelect', 'genderSelect'];
            advToggleInputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('change', () => {
                        const advToggle = document.getElementById('advancedToggle');
                        if(advToggle && advToggle.checked) renderAdvancedRows();
                    });
                }
            });
        }

        function copyToClipboard(type) {
            const contentId = type === 'photo' ? 'jsonOutputPhoto' : 'jsonOutputVideo';
            const btnId = type === 'photo' ? 'copyBtnPhoto' : 'copyBtnVideo';
            
            const contentEl = document.getElementById(contentId);
            if (!contentEl) return;
            const content = contentEl.textContent;
            
            if(content.includes('Memuat...')) return;

            try {
                const textArea = document.createElement("textarea");
                textArea.value = content;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);

                if (successful) {
                    const copyBtn = document.getElementById(btnId);
                    if (copyBtn) {
                        copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
                        copyBtn.classList.remove('bg-slate-700', 'hover:bg-slate-600');
                        copyBtn.classList.add('bg-red-600', 'hover:bg-red-500');
                        
                        setTimeout(() => {
                            copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Salin';
                            copyBtn.classList.remove('bg-red-600', 'hover:bg-red-500');
                            copyBtn.classList.add('bg-slate-700', 'hover:bg-slate-600');
                        }, 2000);
                    }
                }
            } catch (err) {
                console.error('Terjadi error saat menyalin text: ', err);
            }
        }

        window.onload = () => {
            initDropdowns();
            generatePromptNow();
        };
    </script>
</body>
</html>
