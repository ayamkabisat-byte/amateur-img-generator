<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indonesian Amateur & Smartphone Prompt Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        pre {
            background-color: #1e293b;
            scrollbar-width: thin;
            scrollbar-color: #ef4444 #1e293b;
        }
        pre::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        pre::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 4px;
        }
        pre::-webkit-scrollbar-thumb {
            background: #ef4444;
            border-radius: 4px;
        }
        select:disabled, input:disabled, button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #475569;
        }
        .locked-label i {
            color: #ef4444; /* red-500 */
        }
        optgroup {
            font-weight: bold;
            color: #fbbf24;
            background-color: #0f172a;
        }
        option {
            color: #e2e8f0;
        }
        /* Custom Scrollbar for List Boxes */
        .listbox-scroll::-webkit-scrollbar { width: 6px; }
        .listbox-scroll::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        .listbox-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
        .listbox-scroll::-webkit-scrollbar-thumb:hover { background: #475569; }

</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <!-- MAIN CONTENT -->

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2"><i class="fa-solid fa-camera-retro text-red-500 mr-2"></i> Indonesian Amateur Shot V3.5</h1>
            <p class="text-slate-400">Logika Terpadu Kamera & Angle + Ratusan Skenario Gen-Z + Smart Lock + Optimized Core.</p>
        </div>

        <!-- NEW UI DASHBOARD: FILTERS & PARAMETERS -->
        <div class="flex flex-col gap-6 mb-8 w-full">
            
            <!-- GROUP 1: BASIC DEMOGRAPHICS -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg text-sm">
                <div>
                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span>Jumlah Orang</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('numSelect', this)"></i>
                    </label>
                    <select id="numSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 transition-colors cursor-pointer">
                        <option value="RANDOM">🎲 Acak (1-6)</option>
                        <option value="1">1 Orang (Solo)</option>
                        <option value="2">2 Orang (Duo)</option>
                        <option value="3">3 Orang (Grup Kecil)</option>
                        <option value="4">4 Orang (Grup)</option>
                        <option value="5">5 Orang (Grup Besar)</option>
                        <option value="6">6 Orang (Grup Besar)</option>
                    </select>
                </div>
                <div>
                    <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs transition-colors">
                        <span>Rentang Usia</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('ageSelect', this)"></i>
                    </label>
                    <select id="ageSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 transition-colors cursor-pointer">
                        <option value="RANDOM">🎲 Acak Usia</option>
                        <option value="TEENAGER">Remaja (13-19)</option>
                        <option value="YOUNG_ADULT">Dewasa Muda (20-29)</option>

                        <option value="MATURE">Paruh Baya (40+)</option>

                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('bodyTypeSelect', this)"></i>
                    </label>
                    <select id="bodyTypeSelect" onchange="triggerGenerate()" class="w-full bg-slate-900 text-yellow-200 border border-yellow-600 rounded p-2 outline-none focus:border-yellow-400 cursor-pointer">

                        <option value="RANDOM">🎲 Acak Badan</option>
                        <option value="SLIM AND PETITE">Lebih Slim / Kurus</option>

                        <option value="MALE">Semua Pria</option>
                        <option value="FEMALE">Semua Wanita</option>
                        <option value="COUPLE">Couple (Pria & Wanita)</option>

                        <option value="MODERN_2020S">2020s (Modern / Gen-Z)</option>
                        <option value="TIMELESS_BASIC">Timeless / Basic Kasual</option>
                        <option value="HIPSTER_2010S">2010s (Hipster/Indie)</option>
                        <option value="Y2K_2000S">2000s (Y2K/Warnet)</option>

                    <div id="cameraListContainer" class="flex-1 overflow-y-auto listbox-scroll bg-slate-900 border border-orange-600/50 rounded-lg p-2 flex flex-col gap-1.5 transition-all">
                        <!-- JS populated -->

                </div>

                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('aestheticSelect', this)"></i>
                    </label>
                    <input type="hidden" id="aestheticSelect" value="DEFAULT" data-locked="false">
                    <div id="aesListContainer" class="flex-1 overflow-y-auto listbox-scroll bg-slate-900 border border-purple-600/50 rounded-lg p-2 flex flex-col gap-1.5 transition-all">
                        <!-- JS populated -->
                    </div>

                        <option value="RANDOM_HOLIDAY">🎲 Acak (Inkl. Libur)</option>
                        <option value="EID">Idul Fitri (Lebaran)</option>

                        <option value="IMLEK">Imlek (Lunar New Year)</option>

                        <option value="CLEAR">Cerah / Normal</option>
                        <option value="OVERCAST">Mendung (Gloomy)</option>

                        <span>AI Face Rules</span>
                        <i class="fa-solid fa-lock-open cursor-pointer hover:text-white" onclick="toggleLock('strictSelect', this)"></i>

                    <select id="strictSelect" onchange="toggleStrictLevel(); triggerGenerate();" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 cursor-pointer">

// Memuat...

        // --- HELPER FUNCTIONS ---
        function createRadioOption(name, value, labelText, selectedValue, onchangeAttr, subText = "") {
            const isSelected = value === selectedValue ? "checked" : "";
            let subHtml = subText ? `<div class="text-[10px] text-slate-400 leading-tight mt-1 line-clamp-2">${subText}</div>` : "";
            const bgClass = isSelected ? 'bg-slate-700 border-slate-500 shadow-inner' : 'border-transparent hover:border-slate-600 hover:bg-slate-700/50';
            
            return `
            <label class="flex items-start gap-3 p-3 rounded-lg cursor-pointer transition-all border w-full radio-label ${bgClass}">
                <input type="radio" name="${name}" value="${value}" ${isSelected} data-onchange="${onchangeAttr}" class="mt-0.5 accent-red-500 w-4 h-4 shrink-0 cursor-pointer radio-input">
                <div class="flex flex-col flex-1 pointer-events-none">
                    <span class="text-sm text-slate-200 font-semibold leading-tight">${labelText}</span>
                    ${subHtml}
                </div>
            </label>
            `;
        }

        // Event Delegation for List Boxes to prevent sluggishness
        function setupDelegation(containerId, inputId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.addEventListener('change', function(e) {
                if (e.target && e.target.classList.contains('radio-input')) {
                    // Update hidden input
                    const val = e.target.value;
                    document.getElementById(inputId).value = val;
                    
                    // Update Styling
                    container.querySelectorAll('.radio-label').forEach(lbl => {
                        lbl.classList.remove('bg-slate-700', 'border-slate-500', 'shadow-inner');
                        lbl.classList.add('border-transparent', 'hover:border-slate-600', 'hover:bg-slate-700/50');
                    });
                    const parentLabel = e.target.closest('.radio-label');
                    if (parentLabel) {
                        parentLabel.classList.add('bg-slate-700', 'border-slate-500', 'shadow-inner');
                        parentLabel.classList.remove('border-transparent', 'hover:border-slate-600', 'hover:bg-slate-700/50');
                    }

                    // Execute callback (e.g. trigger generation)
                    const onchangeStr = e.target.getAttribute('data-onchange');
                    if (onchangeStr === "triggerGenerate") {
                        triggerGenerate();
                    }
                }
            });
        }

        // Safe getRandom function to avoid undefined errors when arrays are filtered to empty
        function getRandom(arr) { 
            if (!arr || arr.length === 0) return "STANDARD"; 
            return arr[Math.floor(Math.random() * arr.length)]; 
        }

        function isMirrorFriendly(envName) {
            if (!envName) return false;
            const keywords = ["BATHROOM", "BEDROOM", "KOS-KOSAN", "CAFE", "MALL", "CLUB", "RESTROOM", "TOILET", "CORNER", "ROOM", "COMPOUND", "CAR", "INNOVA", "MERCEDES", "ALPHARD", "THRIFT SHOP", "STORE", "ELEVATOR", "BED", "LAUNDROMAT", "PHOTOBOOTH", "CONVEX", "CERMIN"];
            return keywords.some(kw => envName.toUpperCase().includes(kw));
        }

        function getWeightedEra() {
            const totalWeight = eraWeights.reduce((sum, era) => sum + era.weight, 0);
            let randomNum = Math.random() * totalWeight;
            for (const era of eraWeights) {
                if (randomNum < era.weight) return era.id;
                randomNum -= era.weight;
            }
            return "MODERN_2020S";
        }

        function getGenderAndSubject(forcedGender, forcedAge, bodyTypeVal) {
            let agePrefix = "";
            if (forcedAge && forcedAge !== "RANDOM") {
                if (forcedAge === "TEENAGER") agePrefix = "A TEENAGE";
                else if (forcedAge === "YOUNG_ADULT") agePrefix = "A YOUNG";
                else if (forcedAge === "ADULT") agePrefix = "A 30-YEAR-OLD";
                else if (forcedAge === "MATURE") agePrefix = "A MIDDLE-AGED";
            } else {
                const ageRand = Math.random() * 100;
                if (ageRand < 40) agePrefix = "A YOUNG";
                else if (ageRand < 70) agePrefix = "A TEENAGE";
                else if (ageRand < 90) agePrefix = "A 30-YEAR-OLD";
                else agePrefix = "A MIDDLE-AGED";
            }

            let genderStr = "";
            if (forcedGender && forcedGender !== "RANDOM") {
                genderStr = forcedGender;
            } else {
                const rand = Math.random() * 100;
                if (rand < 50) genderStr = "FEMALE";
                else genderStr = "MALE";
            }

            let bodyTypeDesc = "";
            if (bodyTypeVal && bodyTypeVal !== "MATCH" && bodyTypeVal !== "RANDOM") {
                bodyTypeDesc = bodyTypeVal + " ";
            } else if (bodyTypeVal === "RANDOM") {
                bodyTypeDesc = getRandom(["SLIM AND PETITE ", "THICK AND CURVY ", "MUSCULAR AND TONED ", "CHUBBY ", ""]);
            }

            let subjectName = "";
            if (genderStr === "FEMALE") subjectName = `${agePrefix} ${bodyTypeDesc}WOMAN/GIRL`;
            else subjectName = `${agePrefix} ${bodyTypeDesc}MAN/BOY`;

            if (agePrefix === "A TEENAGE") {
                subjectName = subjectName.replace("WOMAN/GIRL", "GIRL").replace("MAN/BOY", "BOY");
            } else {
                subjectName = subjectName.replace("WOMAN/GIRL", "WOMAN").replace("MAN/BOY", "MAN");
            }

            subjectName = subjectName.replace(/\s+/g, ' ').trim();
            return { genderId: genderStr, subjectName: subjectName };

        function toggleLock(selectId, iconEl) {
            const el = document.getElementById(selectId);
            if (!el) return;
            const isLocked = el.dataset.locked === "true";
            
            let containerEl = el;
            if(el.type === 'hidden') {
                if(selectId === 'locSelect') containerEl = document.getElementById('locListContainer');
                if(selectId === 'cameraSelect') containerEl = document.getElementById('cameraListContainer');
                if(selectId === 'aestheticSelect') containerEl = document.getElementById('aesListContainer');
            }

            if (isLocked) {
                el.dataset.locked = "false";
                if(iconEl) {
                    iconEl.classList.remove('fa-lock', 'text-red-500');
                    iconEl.classList.add('fa-lock-open', 'text-slate-500'); 
                    if(iconEl.parentElement && iconEl.parentElement.tagName === 'LABEL') iconEl.parentElement.classList.remove('locked-label');
                }
                
                if(containerEl) {
                    containerEl.classList.remove('border-red-500', 'opacity-50', 'pointer-events-none');
                    if(el.tagName === 'INPUT' && el.type !== 'hidden') containerEl.classList.add('border-green-700');
                    else if (el.type !== 'hidden') containerEl.classList.add('border-slate-600');
                }
            } else {
                el.dataset.locked = "true";
                if(iconEl) {
                    iconEl.classList.remove('fa-lock-open', 'text-slate-500');
                    iconEl.classList.add('fa-lock', 'text-red-500');
                    if(iconEl.parentElement && iconEl.parentElement.tagName === 'LABEL') iconEl.parentElement.classList.add('locked-label');
                }
                
                if(containerEl) {
                    if(el.tagName === 'INPUT' && el.type !== 'hidden') containerEl.classList.remove('border-green-700');
                    else if (el.type !== 'hidden') containerEl.classList.remove('border-slate-600');
                    containerEl.classList.add('border-red-500', 'opacity-50', 'pointer-events-none');
                }
            }
        }

            let weatherDesc = "CLEAR TROPICAL WEATHER";
            if (weatherStr === "OVERCAST") weatherDesc = "OVERCAST AND GLOOMY, CLOUDY SKY, FLAT MOODY LIGHTING";
            if (weatherStr === "RAINING") weatherDesc = "RAINING HEAVILY, WET SURFACES REFLECTING LIGHT, VISIBLE RAINDROPS, CINEMATIC MOODY VIBE";

            let lighting = getRandom(lightings);
            let finalLightingSource = lighting.source;
            let finalLightingQual = lighting.qual;
            let finalCamType = shotData.type;
            let finalRenderEngine = "PHOTOREALISTIC RAW UPLOAD, LOCAL INDONESIAN VIBE, AMATEUR SMARTPHONE SHOT, NO HIGH-END CGI";
            let finalFlaws = selectedEraId === "GRUNGE_1990S" ? "HEAVY FILM GRAIN, LIGHT LEAKS" : selectedEraId === "Y2K_2000S" ? "LOW RES PIXELATION, NOISY" : "SLIGHTLY COMPRESSED SOCIAL MEDIA QUALITY";

            if(envName && (envName.includes("RESTROOM") || envName.includes("BATHROOM"))) {
                lighting = lightings.find(l => l.source.includes("VANITY")) || lightings[0];
                finalLightingSource = lighting.source;
                finalLightingQual = lighting.qual;
            } else if (timeStr === "NIGHT" && lighting.source.includes("SUNLIGHT")) {
                finalLightingSource = "ARTIFICIAL NEON OR STREET LAMPS";
                finalLightingQual = "HIGH CONTRAST, NOISY SHADOWS";
            }

            // SMART NOISE & AMATEUR LOGIC MENDALAM BERDASARKAN WAKTU/LOKASI
            if (timeStr === "NIGHT" || (envName && (envName.includes("CLUB") || envName.includes("DARK") || envName.includes("ALLEY") || envName.includes("NIGHT")))) {
                finalFlaws += ", HEAVY ISO SMARTPHONE NOISE, COLOR FRINGING, GRAINY SHADOWS, POOR LOW-LIGHT ARTIFACTS";
                finalRenderEngine += ", STRUGGLING PHONE SENSOR IN LOW LIGHT";
                
                if (envName.includes("PHONE SCREEN")) {
                    finalLightingSource = "BLUE LIGHT FROM SMARTPHONE SCREEN";
                    finalLightingQual = "HARSH GLOW ON FACE, SURROUNDINGS PITCH BLACK";
                }
            } else if (weatherStr === "OVERCAST" || weatherStr === "RAINING" || (envName && envName.includes("GARAGE"))) {
                finalFlaws += ", FLAT LIGHTING MUTED COLORS, MODERATE NOISE IN SHADOWS, DUST AND HAZE";
            } else if (timeStr === "AFTERNOON" || (envName && envName.includes("SUN FLARES"))) {
                finalFlaws += ", BLOWN OUT HIGHLIGHTS FROM HARSH SUN, SUBTLE LENS GLARE, HEAVY SUN FLARES IN LENS";
            }

            // RAW VIBE OVERRIDE FOR CAR BACK SEAT (Jackpot Logic)
            if (envName && envName.includes("BACK SEAT") && (shotData.type === "CANDID_UNAWARE" || shotData.type === "ACCIDENTAL_AWKWARD_SHOT" || shotData.type === "CANDID_INTENTIONAL")) {
                finalLightingSource = "HARSH DIRECT PHONE FLASH";
                finalLightingQual = "UNEVEN EXPOSURE, BRIGHT HOTSPOT ON FACE AND WATCH, BLOWN HIGHLIGHTS, DEEP SHADOWS";
                finalRenderEngine = "RAW PHOTO, UNEDITED, IMPERFECT REALISM, LOOKS LIKE A REAL PHONE GALLERY SHOT - NOT CINEMATIC, NOT STAGED";
                finalFlaws = "SLIGHT GRAIN/NOISE, UNEVEN WHITE BALANCE, MINOR BLUR FROM MOVEMENT, ACCIDENTAL COMPOSITION, NATURAL SKIN TEXTURE (PORES, SLIGHT OIL SHINE), REFLECTIONS ON GLASS";
            }

            let envDetails = setting ? `${setting.arch}, ${setting.props}` : "";
            if (shotData.type === "CLOSE_UP_SELFIE" || shotData.type === "PORTRAIT_CLOSE_UP") {
                envDetails += ", HEAVILY BLURRED OUT OF FOCUS BACKGROUND, SHALLOW DEPTH OF FIELD"; // Prompt 1
            }

            let activeAesthetic = aestheticVal;
            const aesInput = document.getElementById('aestheticSelect');
            if (aesInput && aesInput.value !== "RANDOM" && aesInput.value !== "DEFAULT") {
                activeAesthetic = aesInput.value;
            } else if (aestheticVal === "RANDOM") {
                if (Math.random() < 0.5) activeAesthetic = getRandom(Object.keys(aestheticFilters));
                else activeAesthetic = "DEFAULT";
            }

            if (activeAesthetic !== "DEFAULT") {
                const aesData = aestheticFilters[activeAesthetic];
                if (aesData) {
                    finalLightingSource = aesData.lighting;
                    finalLightingQual = `[FILTER: ${activeAesthetic}] ` + (aesData.render || finalLightingQual); // Integrated Prompt logic
                    shotData.cameraModel = aesData.cameraType; 
                    finalCamType = `${shotData.type}, ENHANCED WITH ${activeAesthetic} VIBE`;
                    finalRenderEngine = aesData.render + ", RETAINING LOCAL INDONESIAN CONTEXT";
                    finalFlaws = aesData.render; 
                }
            }
            
            const aspectRatios = ["9:16 (VERTICAL TIKTOK/REELS)", "3:4 (SMARTPHONE DEFAULT)", "1:1 (OLD INSTAGRAM)"];
            let aspectRatio = getRandom(aspectRatios);
            if(selectedEraId === "HIPSTER_2010S" || activeAesthetic === "OLD_SMARTPHONE" || activeAesthetic === "ANALOG_AIRY") aspectRatio = "1:1 (OLD INSTAGRAM/POLAROID)";

            let styleName = `INDONESIAN ${selectedEraId.replace('_', ' ')} ${shotData.type.replace(/_/g, ' ')}`;
            if (activeHoliday) styleName = `INDONESIAN ${activeHoliday} CELEBRATION, ${shotData.type.replace(/_/g, ' ')}`;
            if (activeAesthetic !== "DEFAULT") styleName += ` + ${activeAesthetic} AESTHETIC`;

            const imagePromptData = {
                "META": {
                    "STYLERNAME": styleName,
                    "ASPECTRATIO": aspectRatio,
                    "PROMPTPREFIX": `IMG_INDO_${activeHoliday ? activeHoliday : selectedEraId}_${shotData.type}`
                },
                "CAMERA": {
                    "MODEL": shotData.cameraModel,
                    "FOCALLNGTH": shotData.focal,
                    "ANGLE": shotData.angle,
                    "TYPE": `AMATEUR SNAPSHOT, ${finalCamType}`
                },
                "SUBJECT": {
                    "PRIMARY": finalPrimarySubject,
                    "GROUP_DYNAMICS_POSE": shotData.pose,
                    "GAZE": shotData.gaze
                },
                "WARDROBE": {
                    "THEME": activeHoliday ? `${activeHoliday} HOLIDAY ATTIRE` : selectedEraId,
                    "OUTFITS": finalOutfit,
                    "ACCESSORIES": finalAcc,
                    "APPEARANCE": finalAppearance
                },
                "ENVIRONMENT": {
                    "LOCATION": setting ? setting.env : "UNKNOWN",
                    "TIME_OF_DAY": timeDesc,
                    "WEATHER_CONDITION": weatherDesc,
                    "DETAILS": envDetails,
                    "COMPOSITION_VIBE": shotData.vibe
                },
                "LIGHTING": {
                    "SOURCE": finalLightingSource,
                    "DIRECTION": lighting.dir,
                    "QUALITY": finalLightingQual
                },
                "RENDERING_EFFECTS": {
                    "ENGINE": finalRenderEngine,
                    "AESTHETIC_FLAWS": finalFlaws,
                    "POSTPROCESSING": "UNEDITED CAMERA ROLL LOOK"
                }
            };

            // LOGIKA NEGATIVE PROMPT YANG SANGAT MEMATIKAN KESAN PRO / STUDIO / CGI
            let baseNegativePrompt = "professional studio lighting, DSLR quality, perfect composition, symmetrical framing, overly clean, over-smooth skin, beauty filter, cinematic lighting, sharp perfect image, CGI, 3D render";

            if (shotData.type === "FRONT_CAMERA_SELFIE" || shotData.type === "CLOSE_UP_SELFIE" || shotData.type === "CANDID_INTENTIONAL" || shotData.type === "POSED_SCENARIO") {
                if (envName && !(envName.includes("ELEVATOR")) && !(envName.includes("STADIUM")) && !(envName.includes("BRIDGE")) && !(envName.includes("DARK ROOM"))) {
                    imagePromptData.CAMERA["RESTRICTIONS"] = "STRICTLY DO NOT SHOW THE PHONE OR CAMERA IN THE FRAME.";
                    imagePromptData["NEGATIVE_PROMPT"] = `showing phone, holding camera, mobile phone in frame, mirror reflection, ${baseNegativePrompt}`;
                } else {
                    imagePromptData["NEGATIVE_PROMPT"] = baseNegativePrompt;
                }
            } else if (shotData.type === "CANDID_UNAWARE") {
                imagePromptData.CAMERA["RESTRICTIONS"] = "PHOTOGRAPHER IS INVISIBLE. SUBJECT MIGHT BE HOLDING A PHONE NATURALLY.";
                imagePromptData["NEGATIVE_PROMPT"] = `holding camera to take photo, selfie arm, mirror reflection, ${baseNegativePrompt}`;
            } else {
                imagePromptData["NEGATIVE_PROMPT"] = baseNegativePrompt;
            }

            if (hairAccVal === "MATCH_STRICT") {
                imagePromptData["NEGATIVE_PROMPT"] += ", double glasses, extra glasses on head, changing hair style, different accessories, adding hats";
            }
            
            if (envName && (envName.includes("CAR") || envName.includes("INNOVA") || envName.includes("ALPHARD"))) {
                imagePromptData["NEGATIVE_PROMPT"] += ", fake watch, oversized watch, generic car interior, wrong dashboard, staged pose";
            }

            // USER PERSONALIZATION INCORPORATED HERE
            if (strictVal === "STRICT") {
                const strictWeightEl = document.getElementById('strictWeight');
                const strictWeightVal = strictWeightEl ? strictWeightEl.value : "1.0";
                let currentNeg = imagePromptData["NEGATIVE_PROMPT"];
                delete imagePromptData["NEGATIVE_PROMPT"];
                
                imagePromptData["AI_ENFORCEMENT"] = {
                    "STRICT_MODE": "ENABLED",
                    "REFERENCE_IMAGE_STRENGTH": parseFloat(strictWeightVal),
                    "INSTRUCTION": "Enable strict facial consistency mode. Prioritize the facial features from the provided reference image for all subsequent generations. Maintain the subject's identity accurately while only adapting the pose, lighting, and background. Do not alter the core facial structure.", // Exact phrasing matched to user request
                    "NEGATIVE_PROMPT": currentNeg + ", deformed, deviations from prompt, generic faces, morphed bodies, fused people, changing facial features, different person, professional studio lighting"
                };
            }

            let videoSceneDynamics = [];
            if (shotData.type === "POSED_SCENARIO" && customScenario) {
                videoSceneDynamics = [customScenario.toUpperCase()];
            } else if (numSubjects === 1) {
                videoSceneDynamics = ["SUBJECT TALKING ANIMATEDLY TO THE CAMERA USING INDONESIAN SLANG", "AWKWARD SILENCE HANGING OUT AT THE LOCAL SPOT", "SUBJECT WIPING SWEAT CASUALLY IN THE TROPICAL HEAT", "LIP-SYNCING OR DANCING TO VIRAL TIKTOK AUDIO"];
            } else if (genderVal === "COUPLE") {
                videoSceneDynamics = ["COUPLE LAUGHING AND JOKING AROUND TOGETHER ROMANTICALLY", "COUPLE WALKING CLOSE TO EACH OTHER", "ROMANTIC AND CASUAL INTERACTION BETWEEN THE COUPLE"];
            } else {
                videoSceneDynamics = [`GROUP OF ${numSubjects} FRIENDS LAUGHING AND JOKING AROUND TOGETHER`, "GROUP LIP-SYNCING TO VIRAL TIKTOK AUDIO", "SUBJECTS TALKING OVER EACH OTHER IN A VLOG STYLE", "MESSY GROUP INTERACTION, PUSHING EACH OTHER PLAYFULLY INTO THE FRAME"];
            }
                
            const videoCameraMotions = ["SHAKY HANDHELD RECORDING", "QUICK SNAPCHAT ZOOM IN/OUT", "CASUAL PAN AROUND THE SCENE TO SHOW THE ENVIRONMENT", "STATIC BUT HAND SHAKING SLIGHTLY"];
            const sceneDynamic = getRandom(videoSceneDynamics);
            const cameraMotion = getRandom(videoCameraMotions);
            
            const videoPromptData = {
                "WORKFLOW_INSTRUCTION": "USE THE IMAGE GENERATED FROM 'PROMPT_FOTO' AS THE STARTING FRAME (IMAGE-TO-VIDEO)",
                "TARGET_DURATION": getRandom(["5 SECONDS", "7 SECONDS", "10 SECONDS"]),
                "CAMERA_MOVEMENT": cameraMotion,
                "SCENE_DYNAMICS": sceneDynamic,
                "FPS_STYLE": selectedEraId === "MODERN_2020S" ? "60FPS SMARTPHONE VIDEO SMOOTH" : "30FPS CHOPPY DIGITAL VIDEO",
                "TEXT_PROMPT_FOR_AI_VIDEO": `Amateur phone recording style in Indonesia during ${timeStr.toLowerCase().replace('_', ' ')}. The weather is ${weatherStr.toLowerCase()}. ${sceneDynamic}. The camera performs a ${cameraMotion.toLowerCase()}. The video feels raw, authentic.`
            };

            if (strictVal === "STRICT") {
                videoPromptData["TEXT_PROMPT_FOR_AI_VIDEO"] += " STRICT RULE: Do not mutate subject features or fuse people together.";
            }

            // Output to UI
            const photoOut = document.getElementById('jsonOutputPhoto');
            if (photoOut) photoOut.textContent = JSON.stringify(imagePromptData, null, 2);
            
            const videoOut = document.getElementById('jsonOutputVideo');
            if (videoOut) videoOut.textContent = JSON.stringify(videoPromptData, null, 2);
            
            const resetBtn = (id) => {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.innerHTML = '<i class="fa-regular fa-copy"></i> Salin';
                btn.classList.remove('bg-red-600', 'hover:bg-red-500');
                btn.classList.add('bg-slate-700', 'hover:bg-slate-600');
            };
            resetBtn('copyBtnPhoto');
            resetBtn('copyBtnVideo');

            // Button Feedback Animation
            const genBtn = document.getElementById('generateBtn');
            if(genBtn && generateTimeout) {
                const originalHTML = '<i class="fa-solid fa-wand-magic-sparkles text-2xl"></i> GENERATE PROMPT';
                genBtn.innerHTML = '<i class="fa-solid fa-check text-2xl"></i> DIPERBARUI!';
                genBtn.classList.remove('bg-red-600', 'hover:bg-red-500');
                genBtn.classList.add('bg-green-600', 'hover:bg-green-500');
                
                setTimeout(() => {
                    genBtn.innerHTML = originalHTML;
                    genBtn.classList.remove('bg-green-600', 'hover:bg-green-500');
                    genBtn.classList.add('bg-red-600', 'hover:bg-red-500');
                }, 800);
            }
        }

        function resetAndGenerate() {
            const dropdownIds = ['numSelect', 'ageSelect', 'holidaySelect', 'eraSelect', 'locSelect', 'cameraSelect', 'genderSelect', 'timeSelect', 'weatherSelect', 'aestheticSelect', 'strictSelect', 'bodyTypeSelect', 'hairAccSelect'];
            
            dropdownIds.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.dataset.locked !== "true") {
                    if (id === 'holidaySelect') el.value = "RANDOM_HOLIDAY";
                    else if (id === 'aestheticSelect') el.value = "DEFAULT";
                    else if (id === 'strictSelect') el.value = "FLEXIBLE";
                    else if (id === 'bodyTypeSelect') el.value = "MATCH";
                    else el.value = "RANDOM";
                }
            });

            const globalNameInput = document.getElementById('customNameGlobal');
            if (globalNameInput && globalNameInput.dataset.locked !== "true") {
                globalNameInput.value = "";
                handleGlobalNameInput();
            }
            const customScenarioInput = document.getElementById('customScenarioInput');
            if (customScenarioInput && customScenarioInput.dataset.locked !== "true") {
                customScenarioInput.value = "";
            }
            
            const eraSelect = document.getElementById('eraSelect');
            if (eraSelect && eraSelect.dataset.locked !== "true") {
                eraSelect.disabled = false;
                eraSelect.classList.remove('opacity-50', 'cursor-not-allowed');
            }

            const advToggle = document.getElementById('advancedToggle');
            if(advToggle && advToggle.checked) {
                const container = document.getElementById('characterRows');
                if (container) {
                    const rows = container.children.length;
                    for(let i=0; i<rows; i++) {
                        const nameEl = document.getElementById(`adv_name_${i}`);
                        if (nameEl && nameEl.dataset.locked !== "true") nameEl.value = "";
                        
                        const genEl = document.getElementById(`adv_gender_${i}`);
                        if (genEl && genEl.dataset.locked !== "true") genEl.value = "RANDOM";
                        
                        const ageEl = document.getElementById(`adv_age_${i}`);
                        if (ageEl && ageEl.dataset.locked !== "true") ageEl.value = "RANDOM";
                        
                        const demoEl = document.getElementById(`adv_demo_${i}`);
                        if (demoEl && demoEl.dataset.locked !== "true") demoEl.value = "RANDOM";
                    }
                }
                renderAdvancedRows();
            }
            
            renderLocationList();
            renderCameraList();
            renderAestheticList();

            generatePromptNow();
        }

        function updateLocationDropdown() {
            renderLocationList();
            triggerGenerate();
        }

        // --- INIT DROPDOWNS ---
        function initDropdowns() {
            try {
                // Initialize custom list delegation
                setupDelegation('locListContainer', 'locSelect');
                setupDelegation('cameraListContainer', 'cameraSelect');
                setupDelegation('aesListContainer', 'aestheticSelect');

                renderLocationList();
                renderCameraList();
                renderAestheticList();
            } catch(e) {
                console.error("Initialization warning: ", e);
            }

            const advToggleInputs = ['numSelect', 'genderSelect'];
            advToggleInputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('change', () => {
                        const advToggle = document.getElementById('advancedToggle');
                        if(advToggle && advToggle.checked) renderAdvancedRows();
                    });
                }
            });
        }

        function copyToClipboard(type) {
            const contentId = type === 'photo' ? 'jsonOutputPhoto' : 'jsonOutputVideo';
            const btnId = type === 'photo' ? 'copyBtnPhoto' : 'copyBtnVideo';
            
            const contentEl = document.getElementById(contentId);
            if (!contentEl) return;
            const content = contentEl.textContent;
            
            if(content.includes('Memuat...')) return;

            try {
                const textArea = document.createElement("textarea");
                textArea.value = content;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);

                if (successful) {
                    const copyBtn = document.getElementById(btnId);
                    if (copyBtn) {
                        copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
                        copyBtn.classList.remove('bg-slate-700', 'hover:bg-slate-600');
                        copyBtn.classList.add('bg-red-600', 'hover:bg-red-500');
                        
                        setTimeout(() => {
                            copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Salin';
                            copyBtn.classList.remove('bg-red-600', 'hover:bg-red-500');
                            copyBtn.classList.add('bg-slate-700', 'hover:bg-slate-600');
                        }, 2000);
                    }
                }
            } catch (err) {
                console.error('Terjadi error saat menyalin text: ', err);
            }
        }

        window.onload = () => {
            initDropdowns();
            generatePromptNow();
        };
    </script>
</body>
</html>
